<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>
</head>
<body style="text-align: center; font-family: sans-serif; margin-top: 50px;">
    <img src="https://openweathermap.org{{ weather.icon }}@4x.png" alt="icon">
    <h1>{{ weather.city }}, {{ weather.country }}</h1>
    <p style="font-size: 30px;"><b>{{ weather.temp }}°C</b></p>
    <p>На улице: {{ weather.desc }}</p>
    <p>Ветер: {{ weather.wind }} м/с</p>
    <br>
    <a href="/">
        <button type="button" style="padding: 10px 20px; cursor: pointer;">Назад</button>
    </a>
</body>
</html>
